<div class="import-page">

    <div class="import-toolbar">

        <div class="import-actions">
        <h2 id="title">Nạp Excel</h2>
        <div class="import-info" id="import-info"></div>
        <div id="import-summary" class="import-summary"></div>
        <input
           type="file"
           id="excel-file"
           accept=".xlsx,.xls"
           hidden>
          
        <label
           class="file-btn"
           for="excel-file">
           Chọn tệp
        </label>
        
        <span id="file-name">
            Chưa chọn tệp
        </span>
        
        <label>
            Dòng tiêu đề
            <div id="header-row"></div>
        </label>
        
        <div id="dup-mode"></div>
        <button
            id="btn-map"
            type="button">
            Map cột
        </button>
        <button id="btn-run">Nạp dữ liệu</button>
    
        </div>

    </div>



    <div id="import-preview">
        <div id="preview-box"></div>
    </div>

</div>
