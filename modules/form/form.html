<div class="form-head">
  <h2 id="title"></h2>

  <button class="form-btn toolbar-action" id="btn-save">Lưu</button>
  <button class="form-btn toolbar-action" id="btn-cancel">Huỷ</button>

</div>

<div class="form-page">
  <div id="form"></div>
</div>

<!-- Sản phẩm combo -->
<div id="product-children" class="sub-section" style="display:none">
  <div class="section-head">
    <h3>Sản phẩm combo</h3>
    <button id="btn-add-child" type="button">+</button>
  </div>

  <div id="children-list"></div>
</div>

<!-- Quy cách -->
<div id="unit-box" class="sub-section" style="display:none">
  <div class="section-head">
    <h3>Quy cách sản phẩm</h3>
    <button id="btn-add-unit" type="button">+</button>
  </div>

  <div id="unit-list"></div>
</div>

<!-- Biến thể -->
<div id="variant-box" class="sub-section" style="display:none">
  <div class="section-head">
    <h3>Biến thể sản phẩm</h3>
    <button id="btn-add-variant" type="button">+</button>
  </div>

  <div id="variant-list"></div>
</div>
