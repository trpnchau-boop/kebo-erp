<div class="toolbar">


    <label class="catalog-check-all">
      <input
        type="checkbox"
        id="catalog-check-all"
      >
      Chọn tất cả
    </label>

    <span id="catalog-selected-count"></span>



    <div class="search-box">
      <input id="catalog-search" type="text" placeholder="Search..." />

      <button class="search-btn">
      🔍
      </button>
    </div>    

    <div id="catalog-group"></div>

    <button id="btn-share-selected"
            class="excel-btn"
            title="Chia sẻ">
      <img
        src="/icons/share.svg"
        alt="Import"
      >
    </button>     

    <button id="btn-export-selected"
            class="excel-btn"
            title="Tải JPG">
      <img
        src="/icons/jpg.svg"
        alt="Import"
      >
    </button>    

    <button id="btn-pdf-selected"
            class="excel-btn"
            title="Tải PDF">
      <img
        src="/icons/pdf.svg"
        alt="Import"
      >
    </button>   



</div>

  <div"
    id="catalog-grid"
  ></div>
