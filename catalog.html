<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1">

  <title>KEBO Catalog</title>

  <link rel="stylesheet" href="/css/index.css">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

</head>

<body class="catalog-page">

  <!-- HEADER -->
  <header class="topbar">

    <h1 style="margin:0; font-size:18px">
      KEBO CATALOG
    </h1>

    <div class="topbar-actions">

      <a
        href="/login.html"
        class="action-btn"
        style="
          text-decoration:none;
          display:flex;
          align-items:center;
          gap:8px;
        "
      >
        <i class="bi bi-person-circle"></i>
        <span>Đăng nhập</span>
      </a>

    </div>

  </header>

  <!-- CATALOG -->
  <main
    id="content"
    style="
      padding:8px 20px;
    "
  ></main>

  <script type="module">

    import { loadPage } from "/js/router.js"

    await loadPage(
      "catalog",
      {},
      document.getElementById("content")
    )

  </script>

</body>

</html>
